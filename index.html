<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Oxford 500 Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+Thai:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --card: #141414;
    --card2: #1a1a1a;
    --accent: #e8e8e8;
    --dim: #555;
    --known: #4ade80;
    --unknown: #f87171;
    --border: #2a2a2a;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background: var(--bg);
    color: var(--accent);
    font-family: 'Noto Sans Thai', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    width: 100%;
    max-width: 480px;
    padding: 20px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
  }
  .stats-pill {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    background: var(--card);
    border: 1px solid var(--border);
    padding: 5px 12px;
    border-radius: 20px;
  }
  .stats-pill span { color: var(--known); }

  /* PROGRESS BAR */
  .progress-wrap {
    width: 100%;
    max-width: 480px;
    padding: 16px 20px 0;
  }
  .progress-bar {
    width: 100%;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--known);
    border-radius: 2px;
    transition: width 0.5s ease;
  }
  .progress-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    margin-top: 6px;
    display: flex;
    justify-content: space-between;
  }

  /* CARD AREA */
  .card-area {
    width: 100%;
    max-width: 480px;
    padding: 24px 20px;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .card-counter {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 2px;
  }

  /* FLASHCARD */
  .flashcard-wrap {
    width: 100%;
    perspective: 1000px;
    cursor: pointer;
  }
  .flashcard {
    width: 100%;
    min-height: 260px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .flashcard.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    width: 100%;
    min-height: 260px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 36px 28px;
    gap: 12px;
  }
  .card-face.back {
    transform: rotateY(180deg);
    background: var(--card2);
  }

  .card-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
  }
  .card-word {
    font-family: 'Space Mono', monospace;
    font-size: 38px;
    font-weight: 700;
    color: var(--accent);
    text-align: center;
    line-height: 1.1;
    word-break: break-word;
  }
  .card-phonetic {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--dim);
    text-align: center;
  }
  .card-pos {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: #888;
    background: var(--border);
    padding: 3px 10px;
    border-radius: 10px;
    letter-spacing: 1px;
  }
  .card-meaning {
    font-size: 26px;
    font-weight: 600;
    color: var(--accent);
    text-align: center;
    line-height: 1.3;
  }
  .card-example {
    font-size: 13px;
    color: var(--dim);
    text-align: center;
    font-style: italic;
    line-height: 1.5;
    padding-top: 4px;
  }
  .card-tap-hint {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: #333;
    letter-spacing: 2px;
    margin-top: 12px;
  }

  /* MODE BADGE */
  .mode-badge {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--dim);
    background: var(--card);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 10px;
  }
  .mode-badge b { color: var(--accent); }

  /* ACTION BUTTONS */
  .actions {
    width: 100%;
    display: flex;
    gap: 12px;
    padding: 0 20px;
    max-width: 480px;
  }
  .btn {
    flex: 1;
    padding: 18px;
    border: none;
    border-radius: 16px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn:active { transform: scale(0.96); }
  .btn-unknown {
    background: rgba(248,113,113,0.1);
    color: var(--unknown);
    border: 1px solid rgba(248,113,113,0.3);
  }
  .btn-known {
    background: rgba(74,222,128,0.1);
    color: var(--known);
    border: 1px solid rgba(74,222,128,0.3);
  }
  .btn-unknown:active { background: rgba(248,113,113,0.2); }
  .btn-known:active { background: rgba(74,222,128,0.2); }

  /* NEXT BUTTON */
  .btn-next {
    width: calc(100% - 40px);
    max-width: 480px;
    margin: 8px 20px 0;
    padding: 16px;
    background: var(--card);
    color: var(--dim);
    border: 1px solid var(--border);
    border-radius: 16px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-next:active { background: var(--card2); transform: scale(0.98); }

  /* BOTTOM NAV */
  .bottom-nav {
    width: 100%;
    max-width: 480px;
    padding: 16px 20px 32px;
    display: flex;
    justify-content: center;
    gap: 24px;
  }
  .nav-btn {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--dim);
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px 16px;
    border-radius: 10px;
    transition: color 0.15s;
  }
  .nav-btn:active { color: var(--accent); }
  .nav-btn.active { color: var(--accent); }

  /* SCREEN PANELS */
  .screen { display: none; width: 100%; flex-direction: column; align-items: center; }
  .screen.active { display: flex; }

  /* PROGRESS SCREEN */
  .progress-screen {
    width: 100%;
    max-width: 480px;
    padding: 20px;
  }
  .progress-title {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 24px;
    text-align: center;
  }
  .big-stat {
    text-align: center;
    margin-bottom: 32px;
  }
  .big-num {
    font-family: 'Space Mono', monospace;
    font-size: 72px;
    font-weight: 700;
    color: var(--known);
    line-height: 1;
  }
  .big-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 2px;
    margin-top: 8px;
  }
  .stat-row {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
  }
  .stat-box {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
  }
  .stat-box-num {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .stat-box-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 1px;
  }
  .known-words-list {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-top: 12px;
    max-height: 200px;
    overflow-y: auto;
  }
  .known-words-title {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--dim);
    margin-bottom: 12px;
  }
  .word-chip {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--known);
    background: rgba(74,222,128,0.08);
    border: 1px solid rgba(74,222,128,0.2);
    padding: 3px 10px;
    border-radius: 8px;
    margin: 3px;
  }
  .btn-reset {
    width: 100%;
    margin-top: 16px;
    padding: 16px;
    background: none;
    color: var(--unknown);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 16px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-reset:active { background: rgba(248,113,113,0.1); }

  /* COMPLETE */
  .complete-screen {
    text-align: center;
    padding: 40px 20px;
    max-width: 480px;
  }
  .complete-emoji { font-size: 64px; margin-bottom: 16px; }
  .complete-title {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .complete-sub {
    font-size: 14px;
    color: var(--dim);
    margin-bottom: 32px;
  }
  .btn-again {
    padding: 18px 40px;
    background: var(--card);
    color: var(--accent);
    border: 1px solid var(--border);
    border-radius: 16px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-again:active { transform: scale(0.97); }
</style>
</head>
<body>

<!-- STUDY SCREEN -->
<div class="screen active" id="study-screen">
  <div class="header">
    <div class="logo">Oxford · 500</div>
    <div class="stats-pill">จำได้ <span id="known-count">0</span> / 500</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-label">
      <span id="progress-text">0%</span>
      <span id="session-count">session: 0</span>
    </div>
  </div>

  <div class="card-area">
    <div class="card-counter" id="card-counter">001 / 500</div>

    <div class="flashcard-wrap" onclick="flipCard()">
      <div class="flashcard" id="flashcard">
        <div class="card-face front">
          <div class="card-label" id="front-label">ENGLISH</div>
          <div class="card-word" id="front-word">—</div>
          <div class="card-phonetic" id="front-phonetic"></div>
          <div class="card-pos" id="front-pos"></div>
          <div class="card-tap-hint">TAP TO FLIP</div>
        </div>
        <div class="card-face back">
          <div class="card-label" id="back-label">ภาษาไทย</div>
          <div class="card-meaning" id="back-meaning">—</div>
          <div class="card-example" id="back-example"></div>
        </div>
      </div>
    </div>

    <div class="mode-badge">mode: <b id="mode-text">EN → TH</b></div>
  </div>

  <div class="actions">
    <button class="btn btn-unknown" onclick="markCard(false)">✕ ยังไม่รู้</button>
    <button class="btn btn-known" onclick="markCard(true)">✓ จำได้</button>
  </div>
  <button class="btn-next" onclick="nextCard()">ข้ามการ์ดนี้ →</button>

  <div class="bottom-nav">
    <button class="nav-btn active" onclick="showScreen('study')">STUDY</button>
    <button class="nav-btn" onclick="showScreen('progress')">PROGRESS</button>
  </div>
</div>

<!-- PROGRESS SCREEN -->
<div class="screen" id="progress-screen">
  <div class="header">
    <div class="logo">Oxford · 500</div>
    <div class="stats-pill">จำได้ <span id="known-count2">0</span> / 500</div>
  </div>

  <div class="progress-screen">
    <div class="progress-title">ความคืบหน้า</div>

    <div class="big-stat">
      <div class="big-num" id="big-known">0</div>
      <div class="big-label">คำที่จำได้แล้ว</div>
    </div>

    <div class="stat-row">
      <div class="stat-box">
        <div class="stat-box-num" style="color:var(--unknown)" id="stat-remaining">500</div>
        <div class="stat-box-label">คงเหลือ</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-num" style="color:#888" id="stat-session">0</div>
        <div class="stat-box-label">รอบนี้เล่น</div>
      </div>
    </div>

    <div class="known-words-list" id="known-words-list">
      <div class="known-words-title">WORDS MASTERED</div>
      <div id="known-chips">ยังไม่มีคำที่จำได้</div>
    </div>

    <button class="btn-reset" onclick="resetProgress()">↺ รีเซ็ตความคืบหน้า</button>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn" onclick="showScreen('study')">STUDY</button>
    <button class="nav-btn active" onclick="showScreen('progress')">PROGRESS</button>
  </div>
</div>

<!-- COMPLETE SCREEN -->
<div class="screen" id="complete-screen">
  <div class="complete-screen">
    <div class="complete-emoji">🎉</div>
    <div class="complete-title">เล่นครบแล้ว!</div>
    <div class="complete-sub" id="complete-sub">เล่นการ์ดครบทุกใบในรอบนี้</div>
    <button class="btn-again" onclick="startAgain()">เล่นอีกรอบ</button>
  </div>
</div>

<script>
// ============================================================
// OXFORD 500 WORDS (ตัวอย่าง 500 คำ)
// ============================================================
const words = [
  {w:"able",ph:"/ˈeɪ.bəl/",pos:"adj",th:"สามารถ",ex:"Are you able to swim?"},
  {w:"about",ph:"/əˈbaʊt/",pos:"prep",th:"เกี่ยวกับ",ex:"Tell me about yourself."},
  {w:"above",ph:"/əˈbʌv/",pos:"prep",th:"เหนือกว่า",ex:"The sky is above us."},
  {w:"across",ph:"/əˈkrɒs/",pos:"prep",th:"ข้ามไป",ex:"Walk across the road."},
  {w:"act",ph:"/ækt/",pos:"v",th:"กระทำ",ex:"Act quickly!"},
  {w:"active",ph:"/ˈæk.tɪv/",pos:"adj",th:"กระตือรือร้น",ex:"She is very active."},
  {w:"add",ph:"/æd/",pos:"v",th:"บวก / เพิ่ม",ex:"Add some salt."},
  {w:"afraid",ph:"/əˈfreɪd/",pos:"adj",th:"กลัว",ex:"Don't be afraid."},
  {w:"after",ph:"/ˈɑːf.tər/",pos:"prep",th:"หลังจาก",ex:"After school, I play."},
  {w:"again",ph:"/əˈɡen/",pos:"adv",th:"อีกครั้ง",ex:"Say it again."},
  {w:"age",ph:"/eɪdʒ/",pos:"n",th:"อายุ",ex:"What is your age?"},
  {w:"ago",ph:"/əˈɡəʊ/",pos:"adv",th:"ที่แล้ว",ex:"Long ago, there was a king."},
  {w:"agree",ph:"/əˈɡriː/",pos:"v",th:"เห็นด้วย",ex:"I agree with you."},
  {w:"air",ph:"/eər/",pos:"n",th:"อากาศ",ex:"The air is fresh."},
  {w:"all",ph:"/ɔːl/",pos:"det",th:"ทั้งหมด",ex:"All students passed."},
  {w:"allow",ph:"/əˈlaʊ/",pos:"v",th:"อนุญาต",ex:"Allow me to help."},
  {w:"also",ph:"/ˈɔːl.səʊ/",pos:"adv",th:"ด้วย / เช่นกัน",ex:"I also like music."},
  {w:"always",ph:"/ˈɔːl.weɪz/",pos:"adv",th:"เสมอ",ex:"She always smiles."},
  {w:"angry",ph:"/ˈæŋ.ɡri/",pos:"adj",th:"โกรธ",ex:"He was angry."},
  {w:"animal",ph:"/ˈæn.ɪ.məl/",pos:"n",th:"สัตว์",ex:"Dogs are animals."},
  {w:"answer",ph:"/ˈɑːn.sər/",pos:"n/v",th:"คำตอบ / ตอบ",ex:"Answer the question."},
  {w:"any",ph:"/ˈen.i/",pos:"det",th:"ใดก็ได้",ex:"Any colour is fine."},
  {w:"area",ph:"/ˈeə.ri.ə/",pos:"n",th:"พื้นที่",ex:"This area is safe."},
  {w:"around",ph:"/əˈraʊnd/",pos:"prep",th:"รอบๆ",ex:"Walk around the park."},
  {w:"arrive",ph:"/əˈraɪv/",pos:"v",th:"มาถึง",ex:"We arrived late."},
  {w:"ask",ph:"/ɑːsk/",pos:"v",th:"ถาม",ex:"Ask your teacher."},
  {w:"at",ph:"/æt/",pos:"prep",th:"ที่",ex:"Meet me at school."},
  {w:"away",ph:"/əˈweɪ/",pos:"adv",th:"ออกไป",ex:"Go away!"},
  {w:"back",ph:"/bæk/",pos:"n/adv",th:"หลัง / กลับ",ex:"Come back soon."},
  {w:"bad",ph:"/bæd/",pos:"adj",th:"แย่ / ไม่ดี",ex:"That's a bad idea."},
  {w:"ball",ph:"/bɔːl/",pos:"n",th:"ลูกบอล",ex:"Kick the ball."},
  {w:"bank",ph:"/bæŋk/",pos:"n",th:"ธนาคาร",ex:"Go to the bank."},
  {w:"basic",ph:"/ˈbeɪ.sɪk/",pos:"adj",th:"พื้นฐาน",ex:"Basic English skills."},
  {w:"be",ph:"/biː/",pos:"v",th:"เป็น / อยู่",ex:"Be careful!"},
  {w:"beautiful",ph:"/ˈbjuː.tɪ.fəl/",pos:"adj",th:"สวยงาม",ex:"What a beautiful day!"},
  {w:"because",ph:"/bɪˈkɒz/",pos:"conj",th:"เพราะว่า",ex:"I stayed because I liked it."},
  {w:"become",ph:"/bɪˈkʌm/",pos:"v",th:"กลายเป็น",ex:"She became a doctor."},
  {w:"before",ph:"/bɪˈfɔːr/",pos:"prep",th:"ก่อน",ex:"Wash hands before eating."},
  {w:"begin",ph:"/bɪˈɡɪn/",pos:"v",th:"เริ่มต้น",ex:"Let's begin!"},
  {w:"behind",ph:"/bɪˈhaɪnd/",pos:"prep",th:"ข้างหลัง",ex:"Stand behind me."},
  {w:"believe",ph:"/bɪˈliːv/",pos:"v",th:"เชื่อ",ex:"I believe you."},
  {w:"best",ph:"/best/",pos:"adj",th:"ดีที่สุด",ex:"She did her best."},
  {w:"better",ph:"/ˈbet.ər/",pos:"adj",th:"ดีกว่า",ex:"Today is better."},
  {w:"big",ph:"/bɪɡ/",pos:"adj",th:"ใหญ่",ex:"A big dog."},
  {w:"body",ph:"/ˈbɒd.i/",pos:"n",th:"ร่างกาย",ex:"Exercise your body."},
  {w:"book",ph:"/bʊk/",pos:"n",th:"หนังสือ",ex:"Read a book."},
  {w:"both",ph:"/bəʊθ/",pos:"det",th:"ทั้งสอง",ex:"Both are correct."},
  {w:"break",ph:"/breɪk/",pos:"v/n",th:"หยุดพัก / แตก",ex:"Take a break."},
  {w:"bring",ph:"/brɪŋ/",pos:"v",th:"นำมา",ex:"Bring your umbrella."},
  {w:"build",ph:"/bɪld/",pos:"v",th:"สร้าง",ex:"Build a house."},
  {w:"busy",ph:"/ˈbɪz.i/",pos:"adj",th:"ยุ่ง",ex:"I am busy today."},
  {w:"but",ph:"/bʌt/",pos:"conj",th:"แต่",ex:"Small but strong."},
  {w:"buy",ph:"/baɪ/",pos:"v",th:"ซื้อ",ex:"Buy some food."},
  {w:"by",ph:"/baɪ/",pos:"prep",th:"โดย",ex:"Go by bus."},
  {w:"call",ph:"/kɔːl/",pos:"v",th:"โทร / เรียก",ex:"Call me later."},
  {w:"can",ph:"/kæn/",pos:"modal",th:"สามารถ",ex:"I can swim."},
  {w:"car",ph:"/kɑːr/",pos:"n",th:"รถยนต์",ex:"Drive a car."},
  {w:"care",ph:"/keər/",pos:"v/n",th:"ดูแล / ห่วงใย",ex:"Take care of yourself."},
  {w:"carry",ph:"/ˈkær.i/",pos:"v",th:"แบก / พกพา",ex:"Carry the bag."},
  {w:"change",ph:"/tʃeɪndʒ/",pos:"v/n",th:"เปลี่ยน",ex:"Change your clothes."},
  {w:"check",ph:"/tʃek/",pos:"v",th:"ตรวจสอบ",ex:"Check your work."},

// ============================================================
// STATE
// ============================================================
let knownWords = new Set(JSON.parse(localStorage.getItem('oxford_known') || '[]'));
let deck = [];
let currentIndex = 0;
let sessionCount = 0;
let isFlipped = false;
let currentMode = 'en-th'; // 'en-th' or 'th-en'

function saveProgress() {
  localStorage.setItem('oxford_known', JSON.stringify([...knownWords]));
}

function buildDeck() {
  // Unknown words first, then shuffle
  const unknown = words.filter(w => !knownWords.has(w.w));
  deck = unknown.sort(() => Math.random() - 0.5);
  if (deck.length === 0) {
    showComplete();
    return;
  }
  currentIndex = 0;
  renderCard();
}

function randomMode() {
  currentMode = Math.random() > 0.5 ? 'en-th' : 'th-en';
}

function renderCard() {
  if (currentIndex >= deck.length) {
    showComplete();
    return;
  }
  const card = deck[currentIndex];
  randomMode();
  isFlipped = false;
  document.getElementById('flashcard').classList.remove('flipped');

  if (currentMode === 'en-th') {
    document.getElementById('front-label').textContent = 'ENGLISH';
    document.getElementById('front-word').textContent = card.w;
    document.getElementById('front-phonetic').textContent = card.ph;
    document.getElementById('front-pos').textContent = card.pos;
    document.getElementById('back-label').textContent = 'ภาษาไทย';
    document.getElementById('back-meaning').textContent = card.th;
    document.getElementById('back-example').textContent = '"' + card.ex + '"';
    document.getElementById('mode-text').textContent = 'EN → TH';
  } else {
    document.getElementById('front-label').textContent = 'ภาษาไทย';
    document.getElementById('front-word').textContent = card.th;
    document.getElementById('front-phonetic').textContent = '';
    document.getElementById('front-pos').textContent = card.pos;
    document.getElementById('back-label').textContent = 'ENGLISH';
    document.getElementById('back-meaning').textContent = card.w;
    document.getElementById('back-example').textContent = card.ph + ' · "' + card.ex + '"';
    document.getElementById('mode-text').textContent = 'TH → EN';
  }

  const total = words.filter(w => !knownWords.has(w.w)).length;
  document.getElementById('card-counter').textContent =
    String(currentIndex + 1).padStart(3,'0') + ' / ' + String(total).padStart(3,'0');
  updateStats();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('flashcard').classList.toggle('flipped', isFlipped);
}

function markCard(known) {
  const card = deck[currentIndex];
  if (known) {
    knownWords.add(card.w);
    saveProgress();
  }
  sessionCount++;
  currentIndex++;
  renderCard();
  updateStats();
}

function nextCard() {
  sessionCount++;
  currentIndex++;
  renderCard();
}

function updateStats() {
  const k = knownWords.size;
  const pct = Math.round((k / 500) * 100);
  document.getElementById('known-count').textContent = k;
  document.getElementById('known-count2').textContent = k;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = pct + '%';
  document.getElementById('session-count').textContent = 'session: ' + sessionCount;
  // progress screen
  document.getElementById('big-known').textContent = k;
  document.getElementById('stat-remaining').textContent = 500 - k;
  document.getElementById('stat-session').textContent = sessionCount;
  // chips
  const chips = document.getElementById('known-chips');
  if (k === 0) {
    chips.innerHTML = '<span style="color:var(--dim);font-size:12px">ยังไม่มีคำที่จำได้</span>';
  } else {
    chips.innerHTML = [...knownWords].map(w => `<span class="word-chip">${w}</span>`).join('');
  }
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (name === 'study') {
    document.getElementById('study-screen').classList.add('active');
    document.querySelectorAll('.nav-btn')[0].classList.add('active');
  } else if (name === 'progress') {
    document.getElementById('progress-screen').classList.add('active');
    document.querySelectorAll('.nav-btn')[1].classList.add('active');
    updateStats();
  }
}

function showComplete() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const k = knownWords.size;
  document.getElementById('complete-sub').textContent =
    `จำได้แล้ว ${k} คำ จาก 500 คำ 🎯`;
  document.getElementById('complete-screen').classList.add('active');
}

function startAgain() {
  sessionCount = 0;
  buildDeck();
  showScreen('study');
}

function resetProgress() {
  if (confirm('รีเซ็ตความคืบหน้าทั้งหมด?')) {
    knownWords.clear();
    saveProgress();
    sessionCount = 0;
    buildDeck();
    showScreen('study');
    updateStats();
  }
}

// INIT
buildDeck();
updateStats();
</script>
